services:
    qdrant:
        image: qdrant/qdrant:latest
        container_name: qdrant
        restart: unless-stopped
        environment:
            - QDRANT__TELEMETRY_DISABLED=true
            - QDRANT__LOG_LEVEL=INFO
        volumes:
            - ${DATA_SSD}/qdrant_data:/qdrant/storage
        ports:
            - 6333:6333
            - 6334:6334
        configs:
            - source: qdrant_config
              target: /qdrant/config/production.yaml

configs:
    qdrant_config:
        content: |
            cluster:
                enabled: false
            service:
                enable_cors: true

networks:
    default:
        external: true
        name: ${NETWORK_NAME}
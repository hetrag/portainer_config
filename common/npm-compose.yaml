services:
    npm:
        image: jc21/nginx-proxy-manager:latest
        container_name: npm
        restart: unless-stopped
        environment:
            - TZ=${TZ}
        ports:
            - 80:80
            - 81:81
            - 443:443
            - 4492:4492
        volumes:
            - ${CONF_SSD}/npm/data:/data
            - ${CONF_SSD}/npm/letsencrypt:/etc/letsencrypt

networks:
    default:
        external: true
        name: ${NETWORK_NAME}
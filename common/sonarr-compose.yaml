services:
    sonarr:
        image: lscr.io/linuxserver/sonarr:latest
        container_name: sonarr
        restart: unless-stopped
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONF_SSD}/sonarr:/config
            - ${DATA_HDD}/sonarr/MediaCover:/config/MediaCover
            - ${DATA_SSD}/downloads:/downloads
            - ${MEDIA_HDD}/series:/series
        ports:
            - 8989:8989

networks:
    default:
        external: true
        name: ${NETWORK_NAME}
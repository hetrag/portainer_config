services:
    npm:
        image: jc21/nginx-proxy-manager:latest
        container_name: npm
        restart: unless-stopped
        environment:
            - TZ=${TZ}
            - PUID=${PUID}
            - PGID=${PGID}
        ports:
            - ${NPM_HTTP_PORT}:80
            - ${NPM_ADMIN_PORT}:81
            - ${NPM_HTTPS_PORT}:443
            - ${NPM_STREAM_PORT}:4492
        volumes:
            - ${CONF_SSD}/npm/data:/data
            - ${CONF_SSD}/npm/letsencrypt:/etc/letsencrypt

networks:
    default:
        external: true
        name: ${NETWORK_NAME}